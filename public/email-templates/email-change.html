<h2>Confirm change of email</h2>

<p>
  Follow this link to confirm the update of your email from
  {{ .Email }} to {{ .NewEmail }}:
</p>
<p><a href="{{ .SiteURL }}/admin/#email_change_token={{ .Token }}">Change email</a></p>

<p style="color:#666;font-size:14px;">If the button does not work, copy and paste this URL into your browser:<br />{{ .SiteURL }}/admin/#email_change_token={{ .Token }}</p>
